# Fly.io app config for the memorywire Governance UI hosted demo.
#
# One-time setup (run from the repository root):
#
#   fly launch --no-deploy --config deploy/fly.toml --copy-config
#   fly volumes create memorywire_demo_data --region iad --size 1
#   fly secrets set \
#     MEMORYWIRE_UI_TOKEN=$(openssl rand -hex 32) \
#     MEMORYWIRE_UI_CSRF_SECRET=$(python -c 'import secrets, base64; print(base64.b64encode(secrets.token_bytes(32)).decode())')
#   fly deploy --config deploy/fly.toml
#
# MEMORYWIRE_UI_TOKEN — bearer token that gates write operations (approve / reject /
#   co-memorize apply / pattern accept). Anonymous visitors can still browse
#   read-only pages. Rotate with `fly secrets set MEMORYWIRE_UI_TOKEN=...` followed
#   by `fly deploy` (rolling restart).
# MEMORYWIRE_UI_CSRF_SECRET — base64(32 random bytes). Stable across restarts so
#   browser sessions survive deploys. Rotating it logs every browser out.
#
# If `memorywire-governance-demo` is taken on Fly, rename the `app` field below
# (Fly app names are global) and update the README's `Try it live` link.

app = "memorywire-governance-demo"
primary_region = "iad"  # IAD = Ashburn, VA — best for HN/Reddit US-East launch timing.

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 8765
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [http_service.concurrency]
    type = "requests"
    soft_limit = 20
    hard_limit = 25

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1

[[mounts]]
  source = "memorywire_demo_data"
  destination = "/app/data"
  initial_size = "1gb"

[env]
  MEMORYWIRE_UI_AGENT_ID = "demo-agent"
  MEMORYWIRE_UI_DB_PATH  = "/app/data/demo.db"
  MEMORYWIRE_UI_HOST     = "0.0.0.0"
  MEMORYWIRE_UI_PORT     = "8765"

[[restart]]
  policy = "on-failure"
  retries = 5

[deploy]
  strategy = "rolling"
