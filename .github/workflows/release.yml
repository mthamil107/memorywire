name: Release

on:
  push:
    branches: [main]
    tags:
      - "v*"
  # release-please creates the v* tag using the default GITHUB_TOKEN, and
  # GitHub's anti-recursion rule prevents that tag-push event from firing
  # downstream workflows. We therefore *also* listen for `release: published`,
  # which release-please emits once the GitHub release is cut. Either trigger
  # is sufficient for the build + publish chain below.
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      testpypi:
        description: "Publish to TestPyPI instead of PyPI"
        required: false
        default: "false"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  # --------------------------------------------------------------------------
  # release-please: keeps an open release-PR on main that bumps versions and
  # builds the CHANGELOG from Conventional Commits. Merging that PR creates a
  # GitHub release + v* tag, which triggers the build-and-publish job below.
  # --------------------------------------------------------------------------
  release-please:
    name: release-please
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - name: Run release-please
        id: release
        uses: googleapis/release-please-action@v4
        with:
          config-file: .github/release-please-config.json
          manifest-file: .github/.release-please-manifest.json
          token: ${{ secrets.GITHUB_TOKEN }}

  # --------------------------------------------------------------------------
  # build: produces the AMP wheel + sdist, plus a separate UI wheel artifact.
  # Runs on every v* tag push (and on workflow_dispatch for TestPyPI dry-runs).
  # --------------------------------------------------------------------------
  build:
    name: Build distributions
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'release' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # On a `release: published` event the workflow runs against the
          # default branch ref; check out the actual release tag so the
          # version derived by hatch-vcs matches the wheel name.
          ref: ${{ github.event.release.tag_name || github.ref }}
          fetch-depth: 0  # required for hatch-vcs to derive the version from the tag

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Build AMP wheel + sdist
        run: uv build --out-dir dist .

      - name: Build UI wheel (FSL-licensed; built but not auto-published)
        run: uv build --out-dir dist-ui ui/

      - name: List built distributions
        run: |
          echo "=== dist/ (AMP — published to PyPI) ==="
          ls -la dist/
          echo "=== dist-ui/ (UI — FSL, NOT published to PyPI) ==="
          ls -la dist-ui/

      - name: Upload AMP distributions
        uses: actions/upload-artifact@v4
        with:
          name: amp-dist
          path: dist/

      - name: Upload UI distribution (artifact only)
        uses: actions/upload-artifact@v4
        with:
          name: amp-ui-dist
          path: dist-ui/

  # --------------------------------------------------------------------------
  # publish-testpypi: pre-release tags (anything containing a "-", e.g.
  # v0.0.0-rc1, v0.1.0-alpha1) or a manual workflow_dispatch with
  # testpypi=true go to TestPyPI only.
  # --------------------------------------------------------------------------
  publish-testpypi:
    name: Publish to TestPyPI
    needs: build
    if: |
      (startsWith(github.ref, 'refs/tags/v') && contains(github.ref, '-')) ||
      (github.event_name == 'release' && contains(github.event.release.tag_name, '-')) ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.testpypi == 'true')
    runs-on: ubuntu-latest
    environment:
      name: testpypi
      url: https://test.pypi.org/p/agent-memory-protocol
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Download AMP distributions
        uses: actions/download-artifact@v4
        with:
          name: amp-dist
          path: dist/

      - name: Publish to TestPyPI (OIDC, no token)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          attestations: true
          print-hash: true

  # --------------------------------------------------------------------------
  # publish-pypi: real PyPI release. Only runs for final v* tags (no "-").
  # Uses PyPI Trusted Publisher (OIDC) — no API token required.
  # --------------------------------------------------------------------------
  publish-pypi:
    name: Publish to PyPI
    needs: build
    if: |
      (startsWith(github.ref, 'refs/tags/v') && !contains(github.ref, '-')) ||
      (github.event_name == 'release' && !contains(github.event.release.tag_name, '-'))
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/agent-memory-protocol
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Download AMP distributions
        uses: actions/download-artifact@v4
        with:
          name: amp-dist
          path: dist/

      - name: Publish to PyPI (OIDC, no token)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          attestations: true
          print-hash: true

  # --------------------------------------------------------------------------
  # github-release: attaches the built wheels + sdist to the GitHub release
  # that release-please created. Runs for every v* tag.
  # --------------------------------------------------------------------------
  github-release:
    name: Attach artifacts to GitHub release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'release'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name || github.ref }}

      - name: Download AMP distributions
        uses: actions/download-artifact@v4
        with:
          name: amp-dist
          path: dist/

      - name: Download UI distribution
        uses: actions/download-artifact@v4
        with:
          name: amp-ui-dist
          path: dist-ui/

      - name: Upload artifacts to GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          # On tag-push GITHUB_REF is refs/tags/vX.Y.Z; on `release: published`
          # it's the default branch ref, so prefer release.tag_name when set.
          TAG="${RELEASE_TAG:-${GITHUB_REF#refs/tags/}}"
          echo "Attaching artifacts to release $TAG"
          gh release upload "$TAG" dist/*.whl dist/*.tar.gz dist-ui/*.whl --clobber
